title: Jacky's Cloud Blog
description: 分享在雲端世界所學的知識與實戰經驗，聚焦 Azure 平台、資安合規與雲端架構設計
author:
  name: Jacky Chiou
url: "https://jackychiou.github.io"
baseurl: ""

# Theme
theme: just-the-docs

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

plugins:
  - jekyll-seo-tag
  - jekyll-feed

# ─── Just the Docs settings ──────────────────────────────────────────────────
color_scheme: default
search_enabled: true

search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

nav_sort: order

# Header aux links
aux_links:
  "GitHub ↗":
    - "https://github.com/JackyChiou"
aux_links_new_tab: true

# Back to top
back_to_top: true
back_to_top_text: "回到頂部"

# Footer
footer_content: "Copyright &copy; 2026 Jacky Chiou. Powered by <a href=\"https://jekyllrb.com\">Jekyll</a> &amp; <a href=\"https://just-the-docs.com\">Just the Docs</a>."

# Callout colours
callouts_level: loud
callouts:
  highlight:
    color: yellow
  important:
    title: 重要
    color: blue
  new:
    title: 新功能
    color: green
  note:
    title: 注意
    color: purple
  warning:
    title: 警告
    color: red

# ─── Exclude ─────────────────────────────────────────────────────────────────
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - .claude/
  - vendor/

# ─── Default front matter ────────────────────────────────────────────────────
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
